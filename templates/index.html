<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detection</title>
</head>
<body>

<h2>Emotion Detection App</h2>

<textarea id="text" rows="5" cols="50"></textarea><br><br>

<button onclick="detect()">Detect Emotion</button>

<pre id="result"></pre>

<script>
function detect() {
    fetch("/detect", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: document.getElementById("text").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
